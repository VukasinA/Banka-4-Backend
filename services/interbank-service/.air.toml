# services/interbank-service/.air.toml
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o tmp/interbank-service ./cmd/main.go"
bin = "tmp/interbank-service"
full_bin = "tmp/interbank-service"
delay = 1000
exclude_dir = ["tmp", "vendor", "node_modules"]

[log]
time = true

[color]
main = "magenta"

[watch]
include_dir = [".", "../../common"]
include_ext = ["go", "yaml", "sql"]
exclude_dir = ["tmp", "vendor", "node_modules"]

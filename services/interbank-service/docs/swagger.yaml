definitions:
  dto.Asset:
    properties:
      asset:
        additionalProperties: {}
        type: object
      type:
        allOf:
        - $ref: '#/definitions/dto.AssetType'
        enum:
        - MONAS
        - STOCK
        - OPTION
    required:
    - asset
    - type
    type: object
  dto.AssetType:
    enum:
    - MONAS
    - STOCK
    - OPTION
    type: string
    x-enum-varnames:
    - AssetMonas
    - AssetStock
    - AssetOption
  dto.ForeignBankId:
    properties:
      id:
        maxLength: 64
        type: string
      routingNumber:
        type: integer
    required:
    - id
    - routingNumber
    type: object
  dto.IdempotenceKey:
    properties:
      locallyGeneratedKey:
        maxLength: 64
        type: string
      routingNumber:
        type: integer
    required:
    - locallyGeneratedKey
    - routingNumber
    type: object
  dto.MessageEnvelope:
    properties:
      idempotenceKey:
        $ref: '#/definitions/dto.IdempotenceKey'
      messageType:
        allOf:
        - $ref: '#/definitions/dto.MessageType'
        enum:
        - NEW_TX
        - COMMIT_TX
        - ROLLBACK_TX
    required:
    - idempotenceKey
    - messageType
    type: object
  dto.MessageType:
    enum:
    - NEW_TX
    - COMMIT_TX
    - ROLLBACK_TX
    type: string
    x-enum-varnames:
    - MessageTypeNewTx
    - MessageTypeCommitTx
    - MessageTypeRollbackTx
  dto.NoVoteReason:
    properties:
      posting:
        $ref: '#/definitions/dto.Posting'
      reason:
        $ref: '#/definitions/dto.NoVoteReasonKind'
    type: object
  dto.NoVoteReasonKind:
    enum:
    - UNBALANCED_TX
    - NO_SUCH_ACCOUNT
    - NO_SUCH_ASSET
    - UNACCEPTABLE_ASSET
    - INSUFFICIENT_ASSET
    - OPTION_AMOUNT_INCORRECT
    - OPTION_USED_OR_EXPIRED
    - OPTION_NEGOTIATION_NOT_FOUND
    type: string
    x-enum-varnames:
    - ReasonUnbalancedTx
    - ReasonNoSuchAccount
    - ReasonNoSuchAsset
    - ReasonUnacceptableAsset
    - ReasonInsufficientAsset
    - ReasonOptionAmountIncorrect
    - ReasonOptionUsedOrExpired
    - ReasonOptionNegotiationNotFound
  dto.OtcNegotiation:
    properties:
      id:
        $ref: '#/definitions/dto.ForeignBankId'
      offer:
        $ref: '#/definitions/dto.OtcOffer'
      status:
        description: ongoing | accepted | cancelled | expired
        type: string
      updatedAt:
        type: string
    type: object
  dto.OtcOffer:
    properties:
      amount:
        minimum: 1
        type: integer
      buyerId:
        $ref: '#/definitions/dto.ForeignBankId'
      lastModifiedBy:
        $ref: '#/definitions/dto.ForeignBankId'
      premium:
        type: number
      premiumCurrency:
        maxLength: 8
        type: string
      priceCurrency:
        maxLength: 8
        type: string
      pricePerStock:
        type: number
      sellerId:
        $ref: '#/definitions/dto.ForeignBankId'
      settlementDate:
        type: string
      ticker:
        maxLength: 16
        type: string
    required:
    - amount
    - buyerId
    - lastModifiedBy
    - premium
    - premiumCurrency
    - priceCurrency
    - pricePerStock
    - sellerId
    - settlementDate
    - ticker
    type: object
  dto.Posting:
    properties:
      account:
        $ref: '#/definitions/dto.TxAccount'
      amount:
        type: number
      asset:
        $ref: '#/definitions/dto.Asset'
    required:
    - account
    - amount
    - asset
    type: object
  dto.TransactionVote:
    properties:
      reasons:
        items:
          $ref: '#/definitions/dto.NoVoteReason'
        type: array
      vote:
        $ref: '#/definitions/dto.VoteKind'
    type: object
  dto.TxAccount:
    properties:
      id:
        $ref: '#/definitions/dto.ForeignBankId'
      num:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/dto.TxAccountType'
        enum:
        - PERSON
        - ACCOUNT
        - OPTION
    required:
    - type
    type: object
  dto.TxAccountType:
    enum:
    - PERSON
    - ACCOUNT
    - OPTION
    type: string
    x-enum-varnames:
    - TxAccountPerson
    - TxAccountAccount
    - TxAccountOption
  dto.VoteKind:
    enum:
    - "YES"
    - "NO"
    type: string
    x-enum-varnames:
    - VoteYes
    - VoteNo
  errors.AppError:
    properties:
      message:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
info:
  contact: {}
  description: |-
    Bank-to-bank coordination service implementing the inter-bank
    transaction and OTC negotiation protocol. Authentication is
    per-peer via the X-Api-Key header (see §2.10).
  title: Interbank Service API
  version: "1.0"
paths:
  /interbank:
    post:
      consumes:
      - application/json
      description: |-
        Single ingress endpoint for the bank-to-bank protocol (§2.11).
        Accepts NEW_TX, COMMIT_TX and ROLLBACK_TX messages. The
        X-Api-Key header authenticates the sending bank.
      parameters:
      - description: Peer bank API key issued to the caller
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Message envelope (messageType + body)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.MessageEnvelope'
      produces:
      - application/json
      responses:
        "200":
          description: NEW_TX accepted with a vote
          schema:
            $ref: '#/definitions/dto.TransactionVote'
        "202":
          description: Accepted, sender must retransmit later
        "204":
          description: Accepted, no response body
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Receive an inter-bank message
      tags:
      - interbank
  /interbank/negotiations:
    post:
      consumes:
      - application/json
      description: |-
        §3.2 — peer bank's buyer initiates a negotiation against
        a seller in our bank. Returns the ForeignBankId of the
        new negotiation owned by us.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Initial offer
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OtcOffer'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ForeignBankId'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Create OTC negotiation (peer-initiated)
      tags:
      - interbank-otc
  /interbank/negotiations/{rn}/{id}:
    delete:
      description: |-
        §3.5 — either party may withdraw from a negotiation. The
        operation is idempotent: closing an already-closed
        negotiation returns 204 without changing state.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Routing number (this bank)
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Close OTC negotiation
      tags:
      - interbank-otc
    get:
      description: |-
        §3.4 — returns the current state of a negotiation owned by
        this bank. The :rn path parameter must match this bank's
        routing number.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Routing number (this bank)
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OtcNegotiation'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Get OTC negotiation
      tags:
      - interbank-otc
    put:
      consumes:
      - application/json
      description: |-
        §3.3 — peer bank posts a counter-offer against an ongoing
        negotiation owned by us. Buyer/seller and ticker are
        immutable; only negotiable parameters may change. The
        same party may not counter twice in a row (turn rule).
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Routing number (this bank)
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      - description: Updated offer
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OtcOffer'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Turn violation or negotiation closed
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Post counter-offer
      tags:
      - interbank-otc
  /interbank/negotiations/{rn}/{id}/accept:
    get:
      description: |-
        §3.6 — STUB. Triggers a §2 NEW_TX with the 4 premium +
        option-pseudo postings. Implementation pending (depends
        on §2 protocol layer).
      responses: {}
      summary: Accept OTC negotiation
      tags:
      - interbank-otc
  /interbank/public-stock:
    get:
      description: |-
        §3.1 — STUB. Will be wired to trading-service for the list
        of stock holdings marked public for OTC by users in this bank.
      responses: {}
      summary: List public stocks
      tags:
      - interbank-otc
  /interbank/user/{rn}/{id}:
    get:
      description: §3.7 — STUB. Will be wired to user-service.
      responses: {}
      summary: Resolve user display name
      tags:
      - interbank-otc
swagger: "2.0"
